<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SafeHer Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffd6e8, #fff0f5);
}

.container {
  width: 900px;
  height: 520px;
  display: flex;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 15px 35px rgba(0,0,0,0.15);
  background: white;
}

.left {
  flex: 1;
  background: #ffe4ec;
  display: flex;
  justify-content: center;
  align-items: center;
}

.right {
  flex: 1;
  padding: 50px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.title {
  font-size: 42px;
  font-weight: 700;
  color: #ff4d88;
}

.subtitle {
  margin: 10px 0 25px;
  color: #777;
}

form {
  width: 100%;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #ddd;
  border-radius: 10px;
  outline: none;
}

input:focus {
  border-color: #ff4d88;
}

button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #ff4d88, #ff1f6b);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.small {
  margin-top: 12px;
  font-size: 13px;
  color: #888;
  text-align: center;
}

.small a {
  color: #ff2f7a;
  font-weight: 600;
  text-decoration: none;
}

/* ✅ FLASH MESSAGE STYLE */
.flash {
  background: #ffe4ec;
  color: #ff2f7a;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<lottie-player
    src="https://assets2.lottiefiles.com/packages/lf20_w51pcehl.json"
    background="transparent"
    speed="1"
    style="width:340px; height:340px;"
    loop
    autoplay>
</lottie-player>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="title">SafeHer</div>
    <div class="subtitle">Walk with confidence. Stay safe always.</div>

    <!-- ✅ FLASH ERROR MESSAGE -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- LOGIN FORM -->
    <form method="POST">

      <input type="email" name="email" placeholder="Email Address" required />
      <input type="password" name="password" placeholder="Password" required />

      <button type="submit">Login</button>

    </form>

    <div class="small">
      Don't have an account? <a href="/signup">Sign up</a>
    </div>

  </div>

</div>

</body>
</html>
