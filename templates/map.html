<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeHer Map</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    display: flex;
    background: #fff5f8;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    background: #ffffff;
    padding: 20px;
    border-right: 1px solid #ffe4ec;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #ff4d88;
    margin-bottom: 20px;
}

.menu a {
    display: block;
    padding: 12px;
    margin-bottom: 8px;
    text-decoration: none;
    color: #555;
    border-radius: 10px;
    transition: 0.3s;
}

.menu a:hover {
    background: #ffe4ec;
    color: #ff2f7a;
}

.menu a.active {
    background: #ffe4ec;
    color: #ff2f7a;
}

/* LOGOUT */
.logout {
    background: linear-gradient(135deg, #ff6fa5, #ff2f7a);
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
}

/* HEADER */
.header h2 {
    color: #333;
}

.header p {
    color: #777;
    font-size: 14px;
}

/* SEARCH */
.search-box {
    display: flex;
    margin: 15px 0;
}

.search-box input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
}

.search-box button {
    padding: 12px 20px;
    margin-left: 10px;
    border: none;
    border-radius: 10px;
    background: #ff4d8d;
    color: white;
    cursor: pointer;
}

/* CONTENT */
.content {
    display: flex;
    gap: 20px;
}

/* MAP */
#map {
    height: 450px;
    flex: 2;
    border-radius: 15px;
}

/* SIDE PANEL */
.side-panel {
    flex: 1;
    background: white;
    border-radius: 15px;
    padding: 20px;
    color: #666;
}

/* SOS */
.sos {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: linear-gradient(135deg, #ff4d88, #ff1f6b);
    color: white;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    border: none;
    font-size: 22px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR (FIXED NAVIGATION) -->
<div class="sidebar">
    <div>
        <div class="logo"><i class="fas fa-shield-alt"></i> SafeHer</div>

        <div class="menu">
            <a href="/dashboard"><i class="fas fa-home"></i> Home</a>
            <a href="/map" class="active"><i class="fas fa-map"></i> Map</a>
            <a href="/emergency"><i class="fas fa-phone"></i> Emergency</a>

            <!-- ✅ FIXED HERE -->
            <a href="/routes"><i class="fas fa-route"></i> Routes & Alerts</a>

            <a href="/report"><i class="fas fa-exclamation-triangle"></i> Report</a>
        </div>
    </div>

    <button class="logout" onclick="location.href='/logout'">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <h2>Interactive Safety Map</h2>
        <p>Find safest routes, hospitals & police stations</p>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <input type="text" id="locationInput" placeholder="Enter location...">
        <button onclick="searchLocation()">Search</button>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <div id="map"></div>

        <div class="side-panel" id="infoPanel">
            <h3 style="color:#ff2f7a;">📍 Location Info</h3>
            <p>Search a place to view safety insights.</p>
            <br>
            <p>✔ Safe routes</p>
            <p>🏥 Nearby hospitals</p>
            <p>👮 Police stations</p>
        </div>
    </div>

</div>

<!-- SOS -->
<button class="sos" onclick="location.href='/emergency'">
    <i class="fas fa-bell"></i>
</button>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([11.1271, 78.6569], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
}).addTo(map);

var marker;

function searchLocation(){
    let place = document.getElementById("locationInput").value;

    if(place === ""){
        alert("Enter location");
        return;
    }

    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${place}`)
    .then(res => res.json())
    .then(data => {

        if(data.length === 0){
            alert("Location not found");
            return;
        }

        let lat = data[0].lat;
        let lon = data[0].lon;

        map.setView([lat, lon], 13);

        if(marker){
            map.removeLayer(marker);
        }

        marker = L.marker([lat, lon]).addTo(map)
            .bindPopup(place)
            .openPopup();

        document.getElementById("infoPanel").innerHTML = `
            <h3 style="color:#ff2f7a;">📍 ${place}</h3>
            <p>✔ Safe routes available</p>
            <p>🏥 Hospitals nearby</p>
            <p>👮 Police stations nearby</p>
        `;
    });
}
</script>

</body>
</html>
